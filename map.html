<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tree‑Planting Locations</title>
  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
  <!-- svgMap styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/StephanWagner/svgMap@v2.10.1/dist/svgMap.min.css">
  <style>
    #map-container { height: 500px; }
    .animate-fade-in { animation: fadeIn 0.2s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-50 p-6">
  <h1 class="text-2xl font-bold mb-4">Tree‑Planting Locations</h1>

  <!-- Map wrapper -->
  <div id="map-container" class="w-full"></div>

  <!-- Modal for country details -->
  <div id="countryModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-md w-11/12 animate-fade-in">
      <h2 id="modalTitle" class="text-xl font-semibold mb-3"></h2>
      <p id="modalBody" class="mb-4 whitespace-pre-line text-sm"></p>
      <button id="closeModal" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">Close</button>
    </div>
  </div>

  <!-- Dependencies (order matters!) -->
  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/StephanWagner/svgMap@v2.10.1/dist/svgMap.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      /* ------------- DATA ------------- */
      const plantingData = {
        // Confirmed (Certificate) Planting Sites
        'MG': {
          type: 'confirmed',
          projects: ['Eden Reforestation Projects'],
          sites: [
            'Kandrany 1', 'Akalamboro', 'Ampasimarine', 'Akalamboro Dry Deciduous', 'Analamandreky', 'Ankarafantsika', 'Antsanitia Dry Deciduous', 'Antanamarina', 'Antsanitia Mangrove', 'Aranta', 'Akotorery', 'Farabe Lighthouse', 'Mahabana', 'Mariarano', 'Mataitraomby', 'Mbararata', 'Namakia', 'Morangobe', 'Papamena 1', 'Sakoany', 'RN4', 'Papamena 2', 'Vilamatsa', 'Marotaola', 'Ambonio 1', 'Boanamary 1', 'Ankalahila Mangrove', 'Bemangoraka 1', 'Bestiboka Island 1', 'Marotia 1', 'Bestiboka River - Island 2', 'Ambonio 2'
          ],
          link: 'https://tree-nation.com/projects/eden-reforestation-madagascar/site/kandrany-1-2023',
          trees: 0
        },
        'TZ': {
          type: 'confirmed',
          projects: ['Usambara Biodiversity Conservation', 'Plant to Stop Poverty'],
          trees: 0
        },
        'NP': {
          type: 'confirmed',
          projects: ['Eden Reforestation Projects'],
          sites: [
            'Amaltari', 'Attarpur', 'Bachhauli', 'Bhadaure', 'Boch', 'Budhi Rapti', 'Chetnagar', 'Deurali', 'Deuralitar', 'Dolansa', 'Hindi', 'Indrawati', 'Jodhipur', 'Kamal Dhaap', 'Karthali', 'Lamahi', 'Lape', 'Lawati', 'Laxmisthan', 'Mude', 'Paschim Deurali', 'Pokhara', 'Prasauni', 'Udayapur', 'Ruchang', 'Shaktikhor', 'Sildhunga', 'Sirujhar', 'Sundarpur'
          ],
          trees: 0
        },
        'SN': {
          type: 'confirmed',
          projects: ['Forest Garden Program'],
          trees: 0
        },
        'US': {
          type: 'confirmed',
          projects: ['National Forest Recovery'],
          trees: 0
        },
        'CM': {
          type: 'confirmed',
          projects: ['Cocoa Farmer Agroforestry'],
          trees: 0
        },
        'IN': {
          type: 'confirmed',
          projects: ['Community Forest Restoration'],
          trees: 0
        },
        'KE': {
          type: 'confirmed',
          projects: ['Bore'],
          sites: [
            'Kilifi', 'Kiongwe', 'Kipini', 'Kwasasi/Magumba', 'Manda - Matondoni', 'Manda Uwanjani', 'Marerenni and Kurawa', 'Mida Creek', 'Milihoi/Kichwa cha Nyoka', 'Mokowe Mama', 'Mtwapa Creek', 'Mwamdudu', 'Ngomeni', 'Pate Island', 'Port Reitz', 'Tsunza', 'Tudor Creek', 'Amu Ranch Cut Line', 'Big Fig', 'Gatamaiyu', 'Gwasi', 'Imenti Forest', 'Kass FM', 'Kenton Planting Site', 'Kitiligini', 'Monkey Corner', 'Monkey Corner Expansion', 'Ngaya', 'Nyambene', 'Ol Mariko', 'Old Kijabe Town -- Arbor Day', 'Old Kijabe Town -- Aspiration 1', 'Old Kijabe Town -- Aspiration 2', 'Old Kijabe Town -- Verizon', 'Olokurto', 'Turasha'
          ],
          trees: 0
        },
        // Partner/Legacy Planting Regions
        'MZ': {
          type: 'partner',
          projects: ['Gorongosa National Park'],
          description: 'Worked with Tero and Gorongosa Restoration Project (GRP) to restore wildlife to the Gorongosa National Park.',
          link: 'https://blog.jointero.org/gorongosa-national-park/',
          trees: 0
        },
        'CF': {
          type: 'partner',
          projects: ['Chinko Nature Reserve'],
          description: 'Worked with Tero and African Parks for the rehabilitation and management of Chinko Nature Reserve.',
          link: 'https://blog.jointero.org/protecting-chinko-for-the-long-run/',
          trees: 0
        },
        'LA': {
          type: 'partner',
          projects: ['Annamite Range'],
          description: 'Worked with Tero and WWF to protect the Annamite Range.',
          link: 'https://blog.jointero.org/laos-annamite-range/',
          trees: 0
        },
        'CD': {
          type: 'partner',
          projects: ['Kanyama Community Forest'],
          description: 'Worked with Tero and Forum Konservasi Leuser (FKL) in the DRC.',
          link: 'https://blog.jointero.org/kanyama-community-forest/',
          trees: 0
        },
        'TH': {
          type: 'partner',
          projects: ['Western Forest Complex'],
          description: 'Worked with Tero and Panthera for conservation in Thailand.',
          link: 'https://blog.jointero.org/the-western-forest-complex-in-thailand/',
          trees: 0
        },
        'PE': {
          type: 'partner',
          projects: ['Peruvian Andes'],
          description: 'Worked with Tero and Nature and Culture International in the Peruvian Andes.',
          link: 'https://blog.jointero.org/peruvian-andes/',
          trees: 0
        },
        'ID': {
          type: 'partner',
          projects: ['Leuser Ecosystem'],
          description: 'Worked with Tero and Forum Konservasi Leuser (FKL) in Indonesia.',
          link: 'https://blog.jointero.org/the-leuser-ecosystem/',
          trees: 0
        }
      };

      // Color coding for map
      const values = Object.fromEntries(
        Object.entries(plantingData).map(([code, info]) => [
          code, {
            plantedTrees: info.trees && info.trees > 0 ? info.trees : 1,
            color: info.type === 'confirmed' ? '#22c55e' : '#facc15' // green for confirmed, yellow for partner
          }
        ])
      );

      // ------------- MAP -------------
      const map = new svgMap({
        targetElementID: 'map-container',
        data: {
          data: {
            highlight: {
              name: '', // Remove label
              format: '' // Remove format
            }
          },
          applyData: 'highlight',
          values
        },
        colorMin: '#facc15', // yellow for partner
        colorMax: '#22c55e', // green for confirmed
        hideFlag: true,
        hideTooltip: true // Hide the default tooltip
      });

      // ------------- EVENTS -------------
      document.getElementById('map-container').addEventListener('click', e => {
        const countryCode = e.target?.getAttribute('data-id');
        if (!countryCode || !plantingData[countryCode]) return;
        const info = plantingData[countryCode];
        const title = map.getCountryName(countryCode) ?? countryCode;
        let body = '';
        if (info.type === 'confirmed') {
          body += `<span class='font-semibold text-green-700'>Confirmed (Certificate) Site</span>\n`;
          body += `Projects:\n- ${info.projects.join('\n- ')}`;
          if (info.sites) {
            body += `\n\nSites:\n- ${info.sites.join('\n- ')}`;
          }
          if (info.link) {
            body += `\n\n<a href='${info.link}' target='_blank' class='text-blue-600 underline'>View Certificate/Project</a>`;
          }
          body += `\n\nTrees planted: ${info.trees || 'TBD'}`;
        } else if (info.type === 'partner') {
          body += `<span class='font-semibold text-yellow-700'>Partner/Legacy Region</span>\n`;
          body += `Projects:\n- ${info.projects.join('\n- ')}`;
          if (info.description) {
            body += `\n\n${info.description}`;
          }
          if (info.link) {
            body += `\n\n<a href='${info.link}' target='_blank' class='text-blue-600 underline'>Learn More</a>`;
          }
          body += `\n\nTrees planted: ${info.trees || 'TBD'}`;
        }
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = body.replace(/\n/g, '<br>');
        document.getElementById('countryModal').classList.remove('hidden');
      });

      document.getElementById('closeModal').addEventListener('click', () => {
        document.getElementById('countryModal').classList.add('hidden');
      });
    });
  </script>

  <!-- Legend -->
  <div class="mt-8 flex items-center space-x-6 text-sm">
    <div class="flex items-center space-x-2">
      <span class="inline-block w-4 h-4 rounded bg-green-500 border border-green-700"></span>
      <span>Confirmed (Certificate) Planting Site</span>
    </div>
    <div class="flex items-center space-x-2">
      <span class="inline-block w-4 h-4 rounded bg-yellow-400 border border-yellow-600"></span>
      <span>Partner/Legacy Planting Region</span>
    </div>
  </div>

</body>
</html>
